<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Sonique - Web Player</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/loginSignUp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section>
            <a onclick="window.history.back()" class="back">
                <p>< Back</p>
            </a>
            <img src="../assets/images/logo.png" alt="" height="60" width="60">
            <h1>Create Account</h1>
        <form action="">
            <label for="">Name</label>
            <input type="text" name="" id="" placeholder="Name">
            <label for="">Email or username</label>
            <input type="email" name="" id="" placeholder="Email or username">
            <label for="">Password</label>
            <input type="password" name="" id="" placeholder="Password">
            <label for="">Confirm Password</label>
            <input type="password" name="" id="" placeholder="Confirm password">
            <input class="createAcc" type="submit" value="Create account">
        </form>
        <div class="lower-part">
            <p>Already have an account?</p>
            <a href="login.html">Login</a>
        </div>
    </section>
    <p>
        This sign up page is created for educational purposes only. <a href="#">Terms and condition</a>.
        All your information will only store in local storage. Thank you for your understanding.
    </p>
</body>
</html>
