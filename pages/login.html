<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sonique - Web Player</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/loginSignUp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <section>
        <a onclick="window.history.back()" class="back">< Back</a>
        <img src="../assets/images/logo.png" alt="" height="60" width="60">
        <h1>Welcome Back</h1>
        <p id="errorMessage" style="color: red;"></p>

        <form action="">
            <label for="">Email or username</label>
            <input type="email" name="" id="email" placeholder="Email or username">
            <label for="">Password</label>
            <input type="password" name="" id="password" placeholder="Password">
            <a class="forgot">Forgot password?</a>
            <input type="submit" value="login">
        </form>

        <div class="lower-part">
            <div class="or">
                <hr style="width: 165px; height: 1px;">
                    <p>or</p>
                <hr style="width: 165px; height: 1px;">
            </div>

            <div class="social-container">
                <a class="socials">
                    <img src="../assets/images/google.png" alt="">
                </a>
                <a class="socials">
                    <img src="../assets/images/apple-logo.png" alt="">
                </a>
                <a class="socials">
                    <img src="../assets/images/facebook.png" alt="">
                </a>
                <a class="socials">
                    <img src="../assets/images/snapchat.png" alt="">
                </a>
            </div>

            <p>Don't have an account?</p>
            <a href="signUp.html">Sign up</a>
        </div>
    </section>

    <p>
        This login page is created for educational purposes only. <a href="#">Terms and condition</a>.
        Dummy account is provided. Thank you for your cooperation.
    </p>
    
    <div class="error-container">
        <span class="error">
            <svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 24 24">
                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v4m-1.637-9.409L2.257 17.125a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636-2.87L13.637 3.59a1.914 1.914 0 0 0-3.274 0zM12 16h.01"/>
            </svg>
            <h1>Something went wrong.</h1>
            <p>Sorry something went wrong there. Try again</p>
        </span> 
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
