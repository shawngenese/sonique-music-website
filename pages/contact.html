<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sonique - Web Player</title>
    <link rel="icon" href="../assets/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/loginSignUp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <section>
        <a onclick="window.history.back()" class="back">
            <p>< Back</p>
        </a>
        <img src="../assets/images/logo.png" alt="" height="60" width="60">
        <h1>Send us a Message</h1>
        <p id="errorMessage" style="color: rgb(0, 255, 0);"></p>

        <form action="">
            <label for="">Name</label>
            <input type="text" placeholder="Name" id="name" required>
            <label for="">Email or username</label>
            <input type="email" name="" id="email" placeholder="Email or username">
            <label for="">Your message:</label>
            <textarea placeholder="Your Message" rows="5" id="textarea" required"></textarea>
            <input type="submit" value="Send">
        </form>
    </section>

    <p>
        This contact page is created for educational purposes only. <a href="#">Terms and condition</a>.
        Your information will be deleted automatically when you close the browser
    </p>
    
    <div class="error-container">
        <span class="error">
            <svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v4m-1.637-9.409L2.257 17.125a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636-2.87L13.637 3.59a1.914 1.914 0 0 0-3.274 0zM12 16h.01"/></svg>
            <h1>Something went wrong.</h1>
            <p>Sorry something went wrong there. Try again</p>
        </span> 
    </div>
    
    <script>
        document.querySelector("form").addEventListener("submit", (e) => {
            e.preventDefault();
            document.querySelector("#errorMessage").textContent = "Thank you for addressing your concern.";
            setTimeout(() => {
                window.history.back();
            }, 2000);
        });
    </script>
</body>
</html>
